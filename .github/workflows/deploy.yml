name: Update Article Dates

on:
  push:
    branches: [main]

# Cloudflare Pages 已直接連動 GitHub，本 workflow 只負責自動更新文章日期
# Cloudflare Pages 在收到 push 事件後會自行啟動 build & deploy

permissions:
  contents: write

jobs:
  update-dates:
    runs-on: ubuntu-latest
    # 跳過 [skip ci] commit（避免循環）
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Update article dates
        run: python scripts/build.py

      - name: Commit date updates if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          git add data/articles.json articles/
          git diff --staged --quiet || \
            git commit -m "chore: auto-update article dates [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
